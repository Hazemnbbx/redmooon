<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Redmoon Restaurant</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* 🌌 ЗВЁЗДЫ */
.stars {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url("https://www.transparenttextures.com/patterns/stardust.png");
    animation: moveStars 60s linear infinite;
    z-index: -1;
}

@keyframes moveStars {
    from { background-position: 0 0; }
    to { background-position: 1000px 1000px; }
}

/* 🌙 ЛУНА */
.moon {
    position: absolute;
    top: 100px;
    left: -150px;
    width: 120px;
    height: 120px;
    background: red;
    border-radius: 50%;
    box-shadow: 0 0 50px red;
    animation: moveMoon 20s linear infinite;
}

@keyframes moveMoon {
    from { left: -150px; }
    to { left: 110%; }
}

header {
    height: 100vh;
    background: url("https://images.unsplash.com/photo-1504674900247-0877df9cc836") center/cover;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-shadow: 0 0 15px black;
    position: relative;
}

h1 {
    font-size: 70px;
    color: red;
}

.btn {
    padding: 15px 30px;
    background: red;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: white;
    margin: 5px;
}

section {
    padding: 50px;
    text-align: center;
}

.card {
    background: #1a1a1a;
    padding: 20px;
    margin: 10px;
    width: 250px;
    border-radius: 10px;
    border: 1px solid red;
    display: inline-block;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px red;
}

.price {
    color: gold;
    font-weight: bold;
}

footer {
    background: black;
    padding: 20px;
}

/* 📲 КНОПКА WhatsApp */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: green;
    color: white;
    padding: 15px;
    border-radius: 50%;
    font-size: 20px;
    text-decoration: none;
}
</style>

</head>

<body>

<div class="stars"></div>

<header>
    <div class="moon"></div>

    <h1>🌙 Redmoon</h1>
    <p>Ресторан в Талдыкоргане</p>

    <button class="btn" onclick="document.getElementById('menu').scrollIntoView()">Меню</button>
    <button class="btn" onclick="playMusic()">Музыка 🔊</button>
</header>

<section id="menu">
    <h1>Меню</h1>

    <div class="card">
        <h3>Стейк</h3>
        <p class="price">5500₸</p>
    </div>

    <div class="card">
        <h3>Суши</h3>
        <p class="price">4000₸</p>
    </div>

</section>

<section>
    <h2>Контакты</h2>
    <p>📍 Талдыкорган</p>
</section>

<footer>
    <p>© 2026 Redmoon</p>
</footer>

<!-- 🔊 Музыка -->
<audio id="music">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
function playMusic() {
    document.getElementById("music").play();
}
</script>

<!-- 📲 WhatsApp -->
<a href="https://wa.me/77771234567" class="whatsapp">💬</a>

</body>
</html>
